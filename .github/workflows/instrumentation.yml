name: Android Instrumentation Tests

on:
  schedule:
    - cron: '0 2 * * 0' # Run weekly on Sundays at 2:00 AM UTC
  workflow_dispatch: # Enable manual triggers

jobs:
  instrumentation-tests:
    name: Run Emulator Tests
    runs-on: macos-13 # Required for hardware acceleration support for Android emulators

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      continue-on-error: true

    - name: Run Android Emulator and Instrumentation Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Pixel_6
        script: |
          if [ -f "./gradlew" ]; then
            ./gradlew connectedAndroidTest --no-daemon
          else
            gradle connectedAndroidTest --no-daemon
          fi

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-instrumentation-test-reports
        path: app/build/reports/androidTests/connected/
        retention-days: 7
