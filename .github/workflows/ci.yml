name: Android CI Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      continue-on-error: true # Safe in case gradlew is not present or already executable

    # If gradle-wrapper is not present, we will fallback to installed gradle
    - name: Build with Gradle
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Run Unit Tests
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew testDebugUnitTest --no-daemon
        else
          gradle testDebugUnitTest --no-daemon
        fi

    - name: Run Android Lint & Ktlint
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew lintDebug --no-daemon
        else
          gradle lintDebug --no-daemon
        fi
      continue-on-error: true # Keep build green even if lint has suggestions

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DreamRecall-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
